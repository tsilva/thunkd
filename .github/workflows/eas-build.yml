name: Preview Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: preview-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas build --platform android --profile preview --non-interactive --no-wait

      # Uncomment the steps below once a Play Store service account key
      # is stored as the PLAY_STORE_SERVICE_ACCOUNT_KEY GitHub secret.
      #
      # - name: Decode Play Store service account key
      #   run: echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_KEY }}" | base64 -d > service-account-play-store.json
      #
      # - name: Submit to Play Store (internal track)
      #   run: eas submit --platform android --profile production --non-interactive
